name: Check Boilerplate Numbers

# Reusable workflow that scans repository source files for hardcoded
# Schema-/Tool-/Datenquellen-Zahlen and fails when matches outside the
# whitelist paths are detected.
#
# Source-of-Truth for current numbers is flowmcp-schemas-public/stats.json.
# Pattern is built dynamically from stats.json so the lint rule auto-updates
# whenever the stats update upstream.
#
# Memo 060 Phase 8 / PRD-026 Task A.

on:
  workflow_call:
    inputs:
      whitelist-paths:
        type: string
        default: "node_modules,dist,generated,archive,.template.md,.template.mdx,template.txt,stats.json,registry.json,manifest.json,schemas-snapshot.json,refs.json,spec/v2.0.0,spec/v3.0.0,.git"
        description: "Comma-separated list of path fragments to exclude from scan (default covers build outputs, templates, source-of-truth files, historic spec versions)"
      stats-url:
        type: string
        default: "https://raw.githubusercontent.com/FlowMCP/flowmcp-schemas-public/main/stats.json"
        description: "URL of the stats.json that defines current boilerplate numbers"
      additional-patterns:
        type: string
        default: ""
        description: "Pipe-separated extra numeric values to include in the pattern (e.g. legacy values like 187|3100)"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch current stats
        run: curl -sf "${{ inputs.stats-url }}" -o /tmp/stats.json

      - name: Build pattern
        id: pattern
        run: |
          VALS=$(jq -r '[.count_schemas, .count_unique_datasources, .count_tools] | map(tostring) | unique | join("|")' /tmp/stats.json)
          if [ -n "${{ inputs.additional-patterns }}" ]; then
            VALS="${VALS}|${{ inputs.additional-patterns }}"
          fi
          echo "pattern=\\b(${VALS})\\b" >> $GITHUB_OUTPUT
          echo "Built pattern: \\b(${VALS})\\b"

      - name: Scan for hardcoded boilerplate
        shell: bash
        run: |
          set -u
          PATTERN='${{ steps.pattern.outputs.pattern }}'
          EXCLUDES="${{ inputs.whitelist-paths }}"

          # Split excludes into:
          #   * basename-only directory/file excludes (passed to grep --exclude-dir / --exclude)
          #   * pattern excludes (passed to grep --exclude with globs)
          #   * full-path prefix excludes (post-grep filter — needed because grep
          #     --exclude-dir only matches against the basename, not the full path)
          EXCLUDE_FLAGS=""
          PATH_PREFIX_FILTERS=""
          IFS=',' read -ra ITEMS <<< "$EXCLUDES"
          for item in "${ITEMS[@]}"; do
              item_trim=$(echo "$item" | sed 's/^ *//; s/ *$//')
              [ -z "$item_trim" ] && continue
              case "$item_trim" in
                  *.template.md|*.template.mdx|template.txt|stats.json|registry.json|manifest.json|schemas-snapshot.json|refs.json|README.md|DISCLAIMER.md|package-lock.json|*.lock|*.txt)
                      EXCLUDE_FLAGS="$EXCLUDE_FLAGS --exclude=$item_trim"
                      ;;
                  */*)
                      PATH_PREFIX_FILTERS="$PATH_PREFIX_FILTERS|./$item_trim/"
                      ;;
                  *)
                      EXCLUDE_FLAGS="$EXCLUDE_FLAGS --exclude-dir=$item_trim --exclude=$item_trim"
                      ;;
              esac
          done

          INCLUDE_FLAGS="--include=*.md --include=*.mdx --include=*.astro --include=*.mjs --include=*.js --include=*.ts --include=*.tsx --include=*.json --include=*.yml --include=*.yaml --include=*.txt"

          set +e
          RAW_HITS=$(grep -rnE $INCLUDE_FLAGS $EXCLUDE_FLAGS "$PATTERN" . 2>/dev/null || true)

          if [ -n "$PATH_PREFIX_FILTERS" ]; then
              FILTER_RE="${PATH_PREFIX_FILTERS#|}"
              HITS=$(echo "$RAW_HITS" | grep -vE "^($FILTER_RE)" || true)
          else
              HITS="$RAW_HITS"
          fi

          if [ -n "$HITS" ]; then
              echo "::error::Hardcoded boilerplate numbers detected. Use meta.stats pipeline instead."
              echo "$HITS"
              echo ""
              echo "How to fix:"
              echo "  - Replace with {{stats.count_schemas}} / {{stats.count_unique_datasources}} / {{stats.count_tools}} placeholders"
              echo "  - Use a generator script (e.g. render-readme.mjs / sync-stats.mjs) to render the template"
              echo "  - See https://github.com/FlowMCP/flowmcp-schemas-public/blob/main/stats.json for current values"
              exit 1
          fi

          echo "OK: no hardcoded boilerplate numbers detected (pattern: $PATTERN)"
